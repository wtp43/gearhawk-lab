apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: applications
  namespace: argocd
spec:
  sourceRepos:
    - "https://github.com/wtp43/gearhawk-lab"
  destinations:
    - namespace: "argocd"
      server: "*"
    - namespace: "pipeline-workers"
      server: "*"
    # Kept so ArgoCD can prune the old single-namespace gearhawk-website deployment.
    - namespace: "gearhawk-website"
      server: "*"
    - namespace: "gearhawk"
      server: "*"
    - namespace: "api-gearhawk"
      server: "*"
    - namespace: "web-gearhawk"
      server: "*"
    - namespace: "api-gearhawk-dev"
      server: "*"
    - namespace: "web-gearhawk-dev"
      server: "*"
    - namespace: "vllm"
      server: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
