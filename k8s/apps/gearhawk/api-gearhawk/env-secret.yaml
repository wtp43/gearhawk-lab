# Env vars for the api-gearhawk (Hono) service, synced from 1Password.
# Create the item in vault "gearhawk-k8s" with one field per key below; each
# field becomes a key in the generated Secret, consumed via envFrom in the
# deployment. Required fields:
#   NODE_ENV, NEXT_PUBLIC_APP_URL, BETTER_AUTH_URL, BETTER_AUTH_SECRET,
#   DATABASE_URL, PLUNK_KEY, PING_KEY, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
# Optional (referenced in code, add if GitHub OAuth is used):
#   GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: api-gearhawk-env
  namespace: api-gearhawk
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  itemPath: "vaults/gearhawk-k8s/items/api-gearhawk-env"
