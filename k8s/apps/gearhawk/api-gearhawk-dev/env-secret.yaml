# Dev env vars for api-gearhawk (Hono), synced from 1Password. Same field set as
# api-gearhawk-env but holding DEV values. Create the item in vault "gearhawk-k8s".
# Required fields:
#   NODE_ENV, NEXT_PUBLIC_APP_URL, BETTER_AUTH_URL, BETTER_AUTH_SECRET,
#   DATABASE_URL, PLUNK_KEY, PING_KEY, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
# Optional: GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: api-gearhawk-dev-env
  namespace: api-gearhawk-dev
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  itemPath: "vaults/gearhawk-k8s/items/api-gearhawk-dev-env"
