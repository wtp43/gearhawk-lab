# Dev runtime (server-side) env vars for web-gearhawk (Next.js), synced from
# 1Password. Same field set as web-gearhawk-env but holding DEV values.
# Required fields (server-side only):
#   NODE_ENV, DATABASE_URL, UPLOADTHING_TOKEN
# Optional: MAIL_FROM
#
# NOTE: NEXT_PUBLIC_* are build-time (baked into the client bundle), not here —
# pass them as --build-args when building the :web-dev image.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: web-gearhawk-dev-env
  namespace: web-gearhawk-dev
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  itemPath: "vaults/gearhawk-k8s/items/web-gearhawk-dev-env"
