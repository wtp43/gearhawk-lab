# Dev env vars for web-gearhawk (Next.js), synced from 1Password. Same field set
# as web-gearhawk-env but holding DEV values. Required fields:
#   NODE_ENV, NEXT_PUBLIC_TYPESENSE_HOST, NEXT_PUBLIC_TYPESENSE_PORT,
#   NEXT_PUBLIC_TYPESENSE_API_KEY, NEXT_PUBLIC_API_URL, DATABASE_URL,
#   UPLOADTHING_TOKEN
# Optional: NEXT_PUBLIC_REACT_SCAN, MAIL_FROM
#
# NOTE: NEXT_PUBLIC_* are injected at RUNTIME via next-runtime-env (see the
# web-gearhawk env-secret), so envFrom values reach the browser.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: web-gearhawk-dev-env
  namespace: web-gearhawk-dev
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  itemPath: "vaults/gearhawk-k8s/items/web-gearhawk-dev-env"
