apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-gearhawk
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-gearhawk
  template:
    metadata:
      labels:
        app: web-gearhawk
    spec:
      containers:
        - name: web-gearhawk
          image: wjt40398/gearhawk:web-gearhawk-b8ca4db
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: web-gearhawk-env
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 2
              memory: 2Gi
            limits:
              cpu: 4
              memory: 6Gi
      imagePullSecrets:
        - name: docker-secret
