# Runtime (server-side) env vars for the web-gearhawk (Next.js) app, synced from
# 1Password and consumed via envFrom. Create the item in vault "gearhawk-k8s"
# with one field per key below; each field becomes a key in the generated Secret.
# Required fields (server-side only):
#   NODE_ENV, DATABASE_URL, UPLOADTHING_TOKEN
# Optional (referenced in code, add if used): MAIL_FROM
#
# NOTE: the NEXT_PUBLIC_* vars are NOT here. They are inlined into the client
# bundle at `next build` and are passed as Docker --build-args from the CI
# workflow (build-and-update-web-gearhawk.yml), sourced from GitHub Actions repo
# Variables — not injected at runtime.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: web-gearhawk-env
  namespace: web-gearhawk
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  itemPath: "vaults/gearhawk-k8s/items/web-gearhawk-env"
