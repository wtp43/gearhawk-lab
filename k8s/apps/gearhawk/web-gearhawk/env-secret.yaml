# Env vars for the web-gearhawk (Next.js) app, synced from 1Password and consumed
# via envFrom. Create the item in vault "gearhawk-k8s" with one field per key
# below; each field becomes a key in the generated Secret. Required fields:
#   NODE_ENV, NEXT_PUBLIC_TYPESENSE_HOST, NEXT_PUBLIC_TYPESENSE_PORT,
#   NEXT_PUBLIC_TYPESENSE_API_KEY, NEXT_PUBLIC_API_URL, DATABASE_URL,
#   UPLOADTHING_TOKEN
# Optional (referenced in code, add if used):
#   NEXT_PUBLIC_REACT_SCAN, MAIL_FROM
#
# NOTE: NEXT_PUBLIC_* are injected at RUNTIME (not baked at build) — the app uses
# next-runtime-env (<PublicEnvScript /> in layout.tsx + env() reads), so envFrom
# values reach the browser. NEXT_PUBLIC_TYPESENSE_API_KEY is the search-only
# prices key.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: web-gearhawk-env
  namespace: web-gearhawk
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  itemPath: "vaults/gearhawk-k8s/items/web-gearhawk-env"
