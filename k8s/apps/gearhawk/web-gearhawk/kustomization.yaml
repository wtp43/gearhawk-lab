apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: web-gearhawk

resources:
  - ns.yaml
  - env-secret.yaml
  - docker-secret.yaml
  - deployment.yaml
  - service.yaml
  - external-route.yaml
  - hpa.yaml
  - pdb.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: web-gearhawk
      app.kubernetes.io/part-of: gearhawk
      app.kubernetes.io/component: web
      app.kubernetes.io/instance: web-gearhawk
