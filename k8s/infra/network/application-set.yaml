apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: network
  namespace: argocd
  labels:
    gearhawk.lab: network
spec:
  generators:
    - list:
        elements:
          - name: cilium
            path: k8s/infra/network/cilium
            namespace: kube-system
          - name: cloudflared
            path: k8s/infra/network/cloudflared
            namespace: cloudflare
          - name: gateway
            path: k8s/infra/network/gateway
            namespace: gateway
  template:
    metadata:
      name: "{{ name }}"
      labels:
        gearhawk.lab: network
    spec:
      project: network
      source:
        plugin:
          name: kustomize-build-with-helm
        repoURL: https://github.com/wtp43/gearhawk-lab
        targetRevision: HEAD
        path: "{{ path }}"
      destination:
        name: in-cluster
        namespace: "{{ namespace }}"
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
